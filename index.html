<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Card</title>
    <style>
        body{
            margin:0;
            padding:0;
            fony-family:Georgia, serif;
            background: linear-gradient(135deg,#fde2ff,#ffd6ea,#ffe8f3);
            text-align:center;
        }
        body::before{
            content:"✨✨✨✨✨✨✨✨";
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            opacity:0.2;
            font-size:40px;

        }
        .card{
            width=420px;
            margin:60px auto;
            background:white;
            border-radius: 30px;
            box-shadow: 0px,15px,40px,rgba(0,0,0,0.2);
            padding:30px;
        }
        h1{
            color:#e754a8;
            font-size: 36px;
            margin-bottom:10px;
        }
        .line{
            width:120px;
            height:3px;
            background:#ffb6d9;
            margin:auto;
            margin-bottom: 20px;

        }
        img{
            width:100%;
            border-radius: 25px;
            margin-top: 15px;

        }
        .message{
            font-size: 20px;
            color:#555;
            margin-top: 20px;
            line-height: 1.8;

        }
        .footer{
            margin-top: 25px;
            font-size: 15px;
            color:gray;
        }
    </style>
</head>
<body>
    <div class="card"></div>
    <h1> Happy Birthday Iqra💖</h1>
    <div class="line"></div>
    <img src="https://images.unsplash.com/photo-1464349153735-7db50ed83c84">
    <div class="message">
        Today is my special day✨<br>
        May my life be full of happiness 💖<br>
        And my dreams shine bright 🌙
    </div>
    <img src="https://images.unsplash.com/photo-1530103862676-de8c9debad1d">
    <div class="footer">
        Made with love by me for me💖</div>
    </div>
</body>
</html>
